name: Build and Deploy to GitHub Pages

on:
  push:
    paths:
      - 'data.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run build
        run: node build.js data.json

      - name: Find generated HTML
        id: find
        run: |
          HTML=$(ls NewsPraVoce-DPSP-*.html 2>/dev/null | head -n 1)
          if [ -z "$HTML" ]; then
            echo "HTML não encontrado"
            exit 1
          fi
          echo "file=$HTML" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
          keep_files: true
