name: Build and Deploy to GitHub Pages

on:
  push:
    paths:
      - 'data.json'
      - 'build.js'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rodar build
        run: node build.js data.json

      - name: Verificar arquivos gerados
        run: |
          echo "Arquivos na dist:"
          ls -la dist
          FILE=$(ls dist/DPSP-NewsPraVoce-*.html 2>/dev/null | head -n 1)
          if [ -z "$FILE" ]; then
            echo "❌ HTML não encontrado na dist"
            exit 1
          fi
          echo "✅ Encontrado: $FILE"

      - name: Upload artifact (GitHub Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy para GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
